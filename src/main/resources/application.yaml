spring:
  application:
    name: load-test-demo
  jmx:
    enabled: true   # Tomcat 스레드 메트릭 활성화 (TomcatMetricsBinder가 JMX MBean 사용)

  datasource:
    url: jdbc:mysql://localhost:3306/test_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10        # default 10
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false         # 부하 테스트 중 SQL 로그 비활성화

server:
  tomcat:
    threads:
      max: 200                     # 튜닝 변수: 20, 50, 100, 200으로 증가 테스트
#      min-spare: 10
#    accept-count: 100

event:
  max-claims: 10000              # 포인트 지급 최대 인원

management:
  endpoints:
    web:
      exposure:
        include: "*" # 전부 다 열기
  prometheus:
    metrics:
      export:
        enabled: true
    health:
      show-details: always

logging:
  level:
    root: INFO
    # ↓ 부하 테스트 중 비활성화 (로그 I/O가 성능에 영향)
    # HikariCP: 커넥션 획득/반납/타임아웃 상세 로그
#    com.zaxxer.hikari: DEBUG
#    com.zaxxer.hikari.pool.HikariPool: DEBUG
    # SQL: 실행 쿼리 + 데드락 확인용
#    org.hibernate.SQL: DEBUG
    # Spring TX: 트랜잭션 시작/커밋/롤백 추적
#    org.springframework.transaction: DEBUG