spring:
  application:
    name: load-test-demo

  datasource:
    url: jdbc:mysql://localhost:3306/test_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 1        # 튜닝 변수: 2, 5, 10으로 증가 테스트
      minimum-idle: 1
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false         # 부하 테스트 중 SQL 로그 비활성화

server:
  tomcat:
    threads:
      max: 10                     # 튜닝 변수: 20, 50, 100, 200으로 증가 테스트
      min-spare: 10
    accept-count: 100

event:
  max-claims: 1000            # 포인트 지급 최대 인원

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, threaddump
  endpoint:
    health:
      show-details: always
