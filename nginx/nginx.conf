worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Docker 내부 DNS 리졸버
    # valid=5s: 5초마다 재조회 → docker compose --scale 후 신규 컨테이너 자동 감지
    resolver 127.0.0.11 valid=5s ipv6=off;

    access_log off;  # 부하테스트 중 로그 I/O 절감

    server {
        listen 80;

        # 변수로 upstream 지정 → 요청마다 resolver를 통해 DNS 재조회
        # (정적 upstream 블록은 시작 시 한 번만 DNS 조회하므로 --scale 감지 불가)
        set $upstream http://api:8080;

        location / {
            proxy_pass $upstream;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;

            proxy_connect_timeout  3s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;

            # 오류/타임아웃 발생 시 다음 upstream으로 재시도
            proxy_next_upstream       error timeout http_503;
            proxy_next_upstream_tries 2;
        }
    }
}
