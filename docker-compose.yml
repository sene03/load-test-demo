services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5

  mysql:
    image: mysql:8.4.8
    deploy:
      resources:
        limits:
          cpus: '6.0'      # 튜닝 변수: 1.0 / 2.0 / 4.0
          memory: 2g
    command:
      - --slow_query_log=ON          # 슬로우 쿼리 로그 활성화
      - --long_query_time=0.1        # 0.1초(100ms) 이상 걸린 쿼리 기록
      - --log_error_verbosity=3      # 에러 로그 상세도 최대 (deadlock 포함)
      - --innodb_print_all_deadlocks=ON  # 데드락 발생 시 에러 로그에 출력
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234" ]
      interval: 2s
      timeout: 2s
      retries: 5

  api:
    build: .
    deploy:
      resources:
        limits:
          cpus: '2.0'      # 튜닝 변수: 1.0 / 2.0 / 4.0
          memory: 2g    # JVM heap(1g) + metaspace/스레드 스택 여유분
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/test_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      JAVA_OPTS: "-Xms512m -Xmx1g"   # heap 고정 (GC 튜닝 변수)
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy


